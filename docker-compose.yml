services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: jewelry_crm
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    command: sh -c "python manage.py migrate --run-syncdb && gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    env_file:
      - ./backend/.env.example
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  celery:
    build: ./backend
    command: celery -A config worker -l info
    env_file:
      - ./backend/.env.example
    depends_on:
      - backend
      - redis

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
